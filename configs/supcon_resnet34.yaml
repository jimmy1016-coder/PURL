trainer:
  max_epochs: 230
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  limit_val_batches: 0  # Validation skip (0: skip, 1: run)
  devices: 1
  accelerator: gpu
  strategy: auto
  # ckpt_path는 trainer 인자가 아님. resume은 run_train.py가 자동으로 last.ckpt를 찾아서 처리함.
  # 특정 체크포인트에서 resume하려면 아래처럼 실행:
  #   python run_train.py --config configs/supcon.yaml --ckpt_path /path/to/checkpoint.ckpt
  logger:
    - class_path: lightning.pytorch.loggers.tensorboard.TensorBoardLogger
      init_args:
        save_dir: outputs/supcon_resnet34 # SET YOUR EXPERIMENT LOGGING DIR
        name: null
        version: ""
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: interspeech  # wandb project name
        name: Reproduce-supcon-voxceleb2_train  # will use experiment name from config or auto-generate
        save_dir: outputs/supcon_resnet34  # local directory for wandb files
        log_model: false  # set to true if you want to save model checkpoints to wandb
        tags: [supcon, speaker-verification]  # optional tags for organizing experiments
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        filename: "{epoch}_{step}"
        every_n_epochs: 1
        save_top_k: -1
        save_on_train_epoch_end: True
        save_last: True
        enable_version_counter: False
model:
  class_path: trainers.SupConTrainer
  init_args:
    loss_func:
      class_path: losses.SupConLoss
      init_args:
        temperature: 0.1
        learn_temperature: True
        margin: 0.0
    encoder:
      class_path: models.ResNetEncoder
      init_args:
        layers: [3, 4, 6, 3]  # ThinResnet34 구조
        num_filters: [16, 32, 64, 128]
        nOut: 192
        encoder_type: SAP  
    projector:
      class_path: models.IdentityProjector
    clustering_model: # These configuration is applicable only for offline clustering calculation using the run_clustering.py script. Clusters used during training are loaded from a file.
      class_path: sklearn.cluster.KMeans
      init_args:
        n_clusters: 50
        random_state: 0
        n_init: 5
    learning_rate: 0.01
    optim_weight_decay: 2e-06
    lr_scheduler_type: cosine
    sample_rate: ${data.init_args.train_config.sample_rate}
    samples_per_epoch: ${data.init_args.train_config.samples_per_epoch}
    batch_size: ${data.init_args.train_config.batch_size}
data:
  class_path: data.VoxCelebSupConDataModule
  init_args:
    train_config:
      data_dir: /path/to/vox2_dev_wav/wav
      spk2utt_file_path: /path/to/vox2_dev_wav/wav/spk2utt
      wav_processor: torch.nn.Identity
      feature_extractor:
        class_path: data.feature_extractors.SBFbank
        init_args:
          sample_rate: ${data.init_args.train_config.sample_rate}
          f_min: 0
          f_max: 8000
          n_fft: 400
          n_mels: 80
          win_length: 400
          hop_length: 160
          postprocessor: data.augmentations.SpecNormalization
      sample_rate: 16_000
      segment_length: 48_000
      samples_per_epoch: 1_000_000 #800_000 # 원래는 1_000_000
      batch_size: 600 # effective batch_size is 2x larger
      num_workers: 8
    valid_config:
      data_dir: /path/to/vox2_dev_wav/wav
      trials_file_path: resources/vox2_valid_pairs.txt
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: null
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    test_config:
      data_dir: /path/to/vox1_test_wav/wav
      trials_file_path: /path/to/voxceleb1_H.txt
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: null
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    clustering_config:
      data_dir: /path/to/vox2_dev_wav/wav
      spk2utt_file_path: /path/to/vox2_dev_wav/wav/spk2utt
      wav_processor: ${data.init_args.train_config.wav_processor}
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: 48_000
      files_per_speaker: 10
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    use_unique_batch_sampler: True
