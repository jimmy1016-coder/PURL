# SupCon ResNet34 평가용 - VoxSRC2023 test set
# list_test_hard2 대신 voxsrc2023_final_fixed.txt / VoxSRC2023_test 사용
# 체크포인트: outputs/supcon_resnet34

trainer:
  max_epochs: 230
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  limit_val_batches: 0
  devices: 1
  accelerator: gpu
  strategy: auto
  logger:
    - class_path: lightning.pytorch.loggers.tensorboard.TensorBoardLogger
      init_args:
        save_dir: outputs/supcon_resnet34
        name: null
        version: ""
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: interspeech
        name: supcon-resnet34-voxsrc2023-eval
        save_dir: outputs/supcon_resnet34
        log_model: false
        tags: [supcon, resnet34, voxsrc2023, eval]
  callbacks: []
model:
  class_path: trainers.SupConTrainer
  init_args:
    loss_func:
      class_path: losses.SupConLoss
      init_args:
        temperature: 0.1
        learn_temperature: True
        margin: 0.0
    encoder:
      class_path: models.ResNetEncoder
      init_args:
        layers: [3, 4, 6, 3]
        num_filters: [16, 32, 64, 128]
        nOut: 192
        encoder_type: SAP
    projector:
      class_path: models.IdentityProjector
    clustering_model:
      class_path: sklearn.cluster.KMeans
      init_args:
        n_clusters: 50
        random_state: 0
        n_init: 5
    learning_rate: 0.01
    optim_weight_decay: 2e-06
    lr_scheduler_type: cosine
    sample_rate: ${data.init_args.train_config.sample_rate}
    samples_per_epoch: ${data.init_args.train_config.samples_per_epoch}
    batch_size: ${data.init_args.train_config.batch_size}
data:
  class_path: data.VoxCelebSupConDataModule
  init_args:
    train_config:
      data_dir: /home/sooyoung/interspeech/dev/aac
      spk2utt_file_path: /home/sooyoung/interspeech/dev/aac/spk2utt
      wav_processor: torch.nn.Identity
      feature_extractor:
        class_path: data.feature_extractors.SBFbank
        init_args:
          sample_rate: 16_000
          f_min: 0
          f_max: 8000
          n_fft: 400
          n_mels: 80
          win_length: 400
          hop_length: 160
          postprocessor: data.augmentations.SpecNormalization
      sample_rate: 16_000
      segment_length: 48_000
      samples_per_epoch: 1_000_000
      batch_size: 600
      num_workers: 8
    valid_config:
      data_dir: /home/sooyoung/interspeech/dev/aac
      trials_file_path: resources/vox2_valid_pairs.txt
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: null
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    test_config:
      data_dir: /home/sooyoung/interspeech/VoxSRC2023_test
      trials_file_path: /home/sooyoung/interspeech/voxsrc2023_final_fixed.txt
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: null
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    clustering_config:
      data_dir: /home/sooyoung/interspeech/dev/aac
      spk2utt_file_path: /home/sooyoung/interspeech/dev/aac/spk2utt
      wav_processor: ${data.init_args.train_config.wav_processor}
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: 48_000
      files_per_speaker: 10
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    use_unique_batch_sampler: True
