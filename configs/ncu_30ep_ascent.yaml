# NCU 30ep ablation: ncu_loss_type=ascent (clean → SupCon, noisy → -SupCon)
trainer:
  max_epochs: 230  # 200 epoch pretrained + 30 epoch NCU fine-tuning
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  limit_val_batches: 0
  devices: 1
  accelerator: gpu
  strategy: auto
  logger:
    - class_path: lightning.pytorch.loggers.tensorboard.TensorBoardLogger
      init_args:
        save_dir: outputs/ncu-ascent
        name: null
        version: ""
    - class_path: lightning.pytorch.loggers.WandbLogger
      init_args:
        project: interspeech
        name: NCU-ascent-supcon
        save_dir: outputs/ncu-ascent
        log_model: false
        tags: [ncu, ascent, -supcon, ablation, speaker-verification]
  callbacks:
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
      init_args:
        logging_interval: step
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        filename: "{epoch}_{step}"
        every_n_epochs: 1
        save_top_k: -1
        save_on_train_epoch_end: True
        save_last: True
        enable_version_counter: False
model:
  class_path: trainers.NCUTrainer
  init_args:
    loss_func:
      class_path: losses.SupConLoss
      init_args:
        temperature: 0.1
        learn_temperature: True
        margin: 0.0
    encoder:
      class_path: models.ECAPAEncoder
      init_args:
        input_size: 80
        channels:
        - 256
        - 256
        - 256
        - 256
        - 768
        kernel_sizes:
        - 5
        - 3
        - 3
        - 3
        - 1
        dilations:
        - 1
        - 2
        - 3
        - 4
        - 1
        attention_channels: 128
        lin_neurons: 192
        res2net_scale: 8
        se_channels: 128
    projector:
      class_path: models.IdentityProjector
    clustering_model:
      class_path: sklearn.cluster.KMeans
      init_args:
        n_clusters: 50
        random_state: 0
        n_init: 5
    # NCU ascent ablation
    alpha: 0.5
    ncu_loss_type: "ascent"  # clean → SupCon, noisy → -SupCon
    ncu_clean_threshold: 0.5
    ncu_noisy_beta: 5.0  # unused in ascent, kept for config compatibility
    ncu_labels_path: outputs/ncu-ascent/ncu_labels.pkl
    ncu_gmm_every_n_epochs: 30
    ncu_gmm_start_epoch: 200
    ncu_data_dir: /home/sooyoung/interspeech/dev/aac
    ncu_spk2utt_file_path: /home/sooyoung/interspeech/dev/aac/spk2utt
    ncu_batch_size: 2048
    ncu_num_workers: 8
    learning_rate: 0.01
    optim_weight_decay: 2e-06
    lr_scheduler_type: cosine
    sample_rate: ${data.init_args.train_config.sample_rate}
    samples_per_epoch: ${data.init_args.train_config.samples_per_epoch}
    batch_size: ${data.init_args.train_config.batch_size}
data:
  class_path: data.VoxCelebNCUDataModule
  init_args:
    train_config:
      data_dir: /home/sooyoung/interspeech/dev/aac
      spk2utt_file_path: /home/sooyoung/interspeech/dev/aac/spk2utt
      ncu_labels_path: outputs/ncu-ascent/ncu_labels.pkl
      wav_processor: torch.nn.Identity
      feature_extractor:
        class_path: data.feature_extractors.SBFbank
        init_args:
          sample_rate: ${data.init_args.train_config.sample_rate}
          f_min: 0
          f_max: 8000
          n_fft: 400
          n_mels: 80
          win_length: 400
          hop_length: 160
          postprocessor: data.augmentations.SpecNormalization
      sample_rate: 16_000
      segment_length: 48_000
      samples_per_epoch: 1_000_000
      batch_size: 600
      num_workers: 8
    valid_config:
      data_dir: /home/sooyoung/interspeech/dev/aac
      trials_file_path: resources/vox2_valid_pairs.txt
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: null
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    test_config:
      data_dir: /home/sooyoung/interspeech/dev1
      trials_file_path: /home/sooyoung/interspeech/dataset/voxceleb1_H.txt
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: null
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
    clustering_config:
      data_dir: /home/sooyoung/interspeech/dev/aac
      spk2utt_file_path: /home/sooyoung/interspeech/dev/aac/spk2utt
      wav_processor: ${data.init_args.train_config.wav_processor}
      feature_extractor: ${data.init_args.train_config.feature_extractor}
      sample_rate: ${data.init_args.train_config.sample_rate}
      segment_length: 48_000
      files_per_speaker: 10
      batch_size: 1
      num_workers: ${data.init_args.train_config.num_workers}
